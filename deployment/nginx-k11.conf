worker_processes auto;

events {
    worker_connections 1024;
}

http {
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    client_max_body_size 100M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Route /api/ based on Referer — which SPA made the call?
    map $http_referer $api_backend {
        default           "http://host.docker.internal:5000";
        "~*/immich"       "http://immich:2283";
        "~*/frigate"      "http://frigate:5000";
    }

    server {
        listen 80;
        server_name _;

        # --- Flask static files ---
        location /static/ {
            proxy_pass http://host.docker.internal:5000;
            proxy_set_header Host $host;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            add_header Cache-Control "public, max-age=3600";
        }

        # --- API routing (context-aware) ---
        # Flask's own API paths go first (exact prefix match)
        location ~ ^/api/(health|log-|acknowledge|home-data|daily-digest|has-photos|nas-photo|immich-|jellyfin-|pluto-|next-video|frigate-snapshot) {
            proxy_pass http://host.docker.internal:5000;
            proxy_set_header Host $host;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        # Other /api/ calls routed based on Referer (Immich, Frigate, or Flask)
        location /api/ {
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # --- Immich ---
        location /immich/ {
            proxy_pass http://immich:2283/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /_app/ {
            proxy_pass http://immich:2283$request_uri;
        }
        location /favicon {
            proxy_pass http://immich:2283$request_uri;
        }
        location /custom.css {
            proxy_pass http://immich:2283$request_uri;
        }

        # --- Frigate ---
        location /frigate/ {
            proxy_pass http://frigate:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /assets/ {
            proxy_pass http://frigate:5000$request_uri;
        }

        # --- Jellyfin ---
        location /jellyfin/ {
            proxy_pass http://jellyfin:8096/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /web/ {
            proxy_pass http://jellyfin:8096/web/;
        }

        # --- Home Assistant ---
        location /ha/ {
            proxy_pass http://host.docker.internal:8123/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_redirect / /ha/;
            proxy_redirect http://host.docker.internal:8123/ /ha/;
        }
        location ~ ^/(onboarding|auth/authorize|frontend_latest|service_worker|local/) {
            proxy_pass http://host.docker.internal:8123;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /hacsfiles/ {
            proxy_pass http://host.docker.internal:8123/hacsfiles/;
        }

        # --- Senior TV (catch-all) ---
        location / {
            proxy_pass http://host.docker.internal:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
    }
}
