version: "3.8"

# Senior TV — Local Services
# Jellyfin (media), Immich (photos), Home Assistant (smart home)
# Run: docker compose up -d

services:
  # =============================================
  # Nginx — Reverse Proxy (single port for everything)
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - jellyfin
      - immich
      - frigate

  # =============================================
  # Jellyfin — Movie & TV Library
  # =============================================
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      # Mount your media folders here:
      - /home/media/media/movies:/media/movies:ro
      - /home/media/media/shows:/media/shows:ro
      - /home/media/media/music:/media/music:ro
    environment:
      - JELLYFIN_PublishedServerUrl=http://192.168.50.159:8096
    devices:
      - /dev/dri:/dev/dri  # Hardware transcoding (AMD GPU)

  # =============================================
  # Immich — Family Photo Library
  # =============================================
  immich:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich
    restart: unless-stopped
    ports:
      - "2283:2283"
    volumes:
      - ./immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=seniortvimmich2026
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
    depends_on:
      - immich-redis
      - immich-postgres

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-ml
    restart: unless-stopped
    volumes:
      - ./immich/ml-cache:/cache

  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    restart: unless-stopped

  immich-postgres:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    volumes:
      - ./immich/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=seniortvimmich2026
      - POSTGRES_USER=postgres
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS=--data-checksums

  # =============================================
  # Frigate — Camera NVR + Person Detection
  # =============================================
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    restart: unless-stopped
    ports:
      - "8971:8971"   # Web UI
      - "5001:5000"   # API (remapped — 5000 is Senior TV)
      - "8554:8554"   # RTSP restream
    volumes:
      - ./frigate/config:/config
      - ./frigate/storage:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    environment:
      - FRIGATE_RTSP_PASSWORD=Neotys1!
    devices:
      - /dev/dri:/dev/dri  # AMD GPU for detection
      - /dev/video0:/dev/video0  # USB webcam (Logitech C920)
      - /dev/video1:/dev/video1
    shm_size: "256mb"

  # =============================================
  # Home Assistant — Smart Home Control
  # =============================================
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    ports:
      - "8123:8123"
    volumes:
      - ./homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    privileged: true
    network_mode: host
