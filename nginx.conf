worker_processes auto;

events {
    worker_connections 1024;
}

http {
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    client_max_body_size 100M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name _;

        # No nginx auth — Flask handles login with a proper form.
        # All requests pass through to Flask first, which checks
        # CF-Connecting-IP header and redirects to /admin/login if remote.

        # --- Senior TV (main app + auth gateway) ---
        location / {
            proxy_pass http://host.docker.internal:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }

        # --- Jellyfin ---
        location /jellyfin/ {
            proxy_pass http://jellyfin:8096/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # --- Immich ---
        location /immich/ {
            proxy_pass http://immich:2283/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # --- Home Assistant ---
        # HA doesn't support subpaths natively. Proxy /ha/ and also catch
        # HA's internal paths (onboarding, api, auth, static, etc.)
        location /ha/ {
            proxy_pass http://host.docker.internal:8123/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Rewrite HA's redirects to include /ha/ prefix
            proxy_redirect / /ha/;
            proxy_redirect http://host.docker.internal:8123/ /ha/;
        }

        # Catch HA internal paths that it redirects to without /ha/ prefix
        # NOTE: "static" removed — conflicts with Flask's /static/ folder
        location ~ ^/(onboarding|auth/authorize|api/hassio|frontend_latest|service_worker|local/) {
            proxy_pass http://host.docker.internal:8123;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # HA static assets (use /ha-static/ to avoid conflict with Flask /static/)
        location /hacsfiles/ {
            proxy_pass http://host.docker.internal:8123/hacsfiles/;
        }

        # --- Frigate (API on port 5000, not the HTTPS UI on 8971) ---
        location /frigate/ {
            proxy_pass http://frigate:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
