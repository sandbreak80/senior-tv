worker_processes auto;

events {
    worker_connections 1024;
}

http {
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    client_max_body_size 100M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name _;

        # --- Jellyfin (native base URL /jellyfin) ---
        location /jellyfin {
            proxy_pass http://host.docker.internal:8096;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        # --- Immich (no native subpath — strip prefix + rewrite) ---
        location /immich/ {
            proxy_pass http://host.docker.internal:2283/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 86400s;

            # Rewrite SvelteKit base path so the SPA navigates under /immich/
            sub_filter_types text/html text/css application/javascript text/javascript;
            sub_filter_once off;
            # Critical: set SvelteKit base to /immich so all client-side routing works
            sub_filter 'base: "",' 'base: "/immich",';
            sub_filter 'href="/' 'href="/immich/';
            sub_filter "href='/" "href='/immich/";
            sub_filter 'src="/' 'src="/immich/';
            sub_filter "src='/" "src='/immich/";
            sub_filter 'action="/' 'action="/immich/';
            sub_filter 'url(/' 'url(/immich/';
            sub_filter '"/api/' '"/immich/api/';
            sub_filter "'/api/" "'/immich/api/";
            sub_filter '`/api`' '`/immich/api`';
            sub_filter 'fetch("/' 'fetch("/immich/';
            sub_filter "fetch('/" "fetch('/immich/";
            # Import paths in the SvelteKit bootstrap script
            sub_filter 'import("/_app/' 'import("/immich/_app/';
            sub_filter "import('/_app/" "import('/immich/_app/";
            proxy_set_header Accept-Encoding "";
        }

        # --- Immich SPA routes without /immich/ prefix → redirect ---
        # The SPA sometimes navigates to /auth/login instead of /immich/auth/login
        location ~ ^/(auth|photos|albums|people|explore|sharing|user-settings|search|partners|trash|map|memory)(.*) {
            return 302 /immich/$1$2$is_args$args;
        }

        # --- Immich assets loaded with relative paths resolve wrong → proxy to Immich ---
        location /_app/ {
            proxy_pass http://host.docker.internal:2283/_app/;
            proxy_set_header Host $host;
            proxy_set_header Accept-Encoding "";
            sub_filter_types text/css text/javascript application/javascript;
            sub_filter_once off;
            sub_filter '`/api`' '`/immich/api`';
        }

        # --- Senior TV Flask app (admin panel + TV UI) ---
        location / {
            proxy_pass http://host.docker.internal:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
    }
}
