worker_processes auto;

events {
    worker_connections 1024;
}

http {
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    client_max_body_size 100M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name _;

        # --- Flask static files ---
        location /static/ {
            proxy_pass http://host.docker.internal:5000;
            proxy_set_header Host $host;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            add_header Cache-Control "public, max-age=3600";
        }

        # --- Immich (SPA + its root-relative asset paths) ---
        location /immich/ {
            proxy_pass http://immich:2283/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        # Immich SPA assets (loaded from root by the SPA shell)
        location /_app/ {
            proxy_pass http://immich:2283$request_uri;
        }
        location /favicon {
            proxy_pass http://immich:2283$request_uri;
        }
        location /custom.css {
            proxy_pass http://immich:2283$request_uri;
        }

        # --- Frigate (SPA + its root-relative asset paths) ---
        location /frigate/ {
            proxy_pass http://frigate:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        # Frigate SPA assets (loaded from root by the SPA shell)
        location /assets/ {
            proxy_pass http://frigate:5000$request_uri;
        }

        # --- Jellyfin ---
        location /jellyfin/ {
            proxy_pass http://jellyfin:8096/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        # Jellyfin web assets
        location /web/ {
            proxy_pass http://jellyfin:8096/web/;
        }

        # --- Home Assistant ---
        location /ha/ {
            proxy_pass http://host.docker.internal:8123/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_redirect / /ha/;
            proxy_redirect http://host.docker.internal:8123/ /ha/;
        }
        # HA internal paths
        location ~ ^/(onboarding|auth/authorize|frontend_latest|service_worker|local/) {
            proxy_pass http://host.docker.internal:8123;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /hacsfiles/ {
            proxy_pass http://host.docker.internal:8123/hacsfiles/;
        }

        # --- Senior TV (catch-all) ---
        location / {
            proxy_pass http://host.docker.internal:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
    }
}
