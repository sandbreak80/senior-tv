{% extends "admin/base.html" %}
{% block title %}Add Birthday{% endblock %}
{% block content %}
<h1 class="page-heading">🎂 Add Birthday</h1>
<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required placeholder="e.g. Cheryl">
        </div>
        <div class="form-group">
            <label>Birthday *</label>
            <div style="display:flex;gap:8px">
                <select name="birth_month" required style="flex:1">
                    <option value="">Month</option>
                    {% for m in ['01','02','03','04','05','06','07','08','09','10','11','12'] %}
                    <option value="{{ m }}">{{ ['January','February','March','April','May','June','July','August','September','October','November','December'][loop.index0] }}</option>
                    {% endfor %}
                </select>
                <select name="birth_day" required style="flex:1">
                    <option value="">Day</option>
                    {% for d in range(1, 32) %}
                    <option value="{{ '%02d' % d }}">{{ d }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="birth_year">Birth Year (optional)</label>
            <input type="number" id="birth_year" name="birth_year" placeholder="e.g. 1965">
            <div class="hint">If provided, the greeting will include their age</div>
        </div>
        <div class="form-group">
            <label for="relationship">Relationship</label>
            <input type="text" id="relationship" name="relationship" placeholder="e.g. Daughter, Grandson">
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Add Birthday</button>
            <a href="/admin/birthdays" class="btn" style="color: var(--text-muted);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
